# ShellCraft clean-run stack.
#
#   docker compose up --build                    # frontend on http://localhost:4200
#   docker compose --profile full up --build     # frontend + backend + sandbox image
#
# Real Linux terminal (Labs 01–05) needs the full profile and Docker socket on the host.
services:
  frontend:
    build:
      context: ./frontend
    image: shellcraft-frontend
    ports:
      - "4200:80"
    restart: unless-stopped

  sandbox-lab-01:
    build:
      context: ./backend/sandbox
    image: shellcraft-sandbox-lab-01:latest
    profiles: ["full"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shellcraft
      POSTGRES_PASSWORD: shellcraft
      POSTGRES_DB: shellcraft
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shellcraft -d shellcraft"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    profiles: ["full"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    profiles: ["full"]

  backend:
    build:
      context: ./backend
    image: shellcraft-backend
    ports:
      - "8000:8000"
    environment:
      SHELLCRAFT_SANDBOX: "1"
      SHELLCRAFT_SANDBOX_IMAGE: shellcraft-sandbox-lab-01:latest
      DATABASE_URL: postgresql+asyncpg://shellcraft:shellcraft@postgres:5432/shellcraft
      REDIS_URL: redis://redis:6379/0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      sandbox-lab-01:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["full"]

volumes:
  postgres-data:
  redis-data:
