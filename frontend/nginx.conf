# Map the Upgrade header so WebSocket connections (sandbox PTY) proxy cleanly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy the API (REST + sandbox WebSocket) to the backend service.
    # Use Docker's embedded DNS resolver + a variable upstream so nginx still
    # starts when `backend` is absent (a plain `docker compose up` without the
    # full profile). The location simply 502s until the backend is up.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
    }

    # SPA fallback so Angular Router deep links (e.g. /lab/lab-02) resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
