<main class="sc-app">
  <header class="sc-topbar">
    <button class="sc-brand" type="button" (click)="go('/')" aria-label="Open landing page">
      <span class="sc-brand-mark">$_</span>
      <span>
        <strong>ShellCraft</strong>
        <small>Interactive Linux Lab</small>
      </span>
    </button>

    <nav class="sc-nav" aria-label="ShellCraft screens">
      @for (item of nav; track item.path) {
        <button
          type="button"
          [class.is-active]="isActive(item)"
          (click)="go(item.path)"
        >
          {{ item.label }}
        </button>
      }
    </nav>

    <div class="sc-session">
      <span>ShellCraft</span>
      <strong>Pro Developer</strong>
    </div>
  </header>

  <router-outlet />
</main>
