<div class="sc-terminal-card sc-live-terminal" [class.is-busy]="busy()">
  <div class="sc-window-bar">
    <span class="dot red"></span>
    <span class="dot amber"></span>
    <span class="dot green"></span>
    <small>guest@linux-lab@if (labTitle()) { - {{ labTitle() }} }</small>
  </div>

  <div #terminalBody class="sc-terminal-body" aria-live="polite">
    @for (entry of history(); track $index) {
      <p class="prompt">{{ entry.prompt }} {{ entry.command }}</p>
      @for (line of entry.output; track $index) {
        <p [class.sc-error-line]="!entry.correct">{{ line }}</p>
      }
    }

    @if (completed()) {
      <p class="sc-success-line">Lab complete - every step cleared.</p>
    } @else {
      <div class="sc-input-line" (click)="focusInput()">
        <p class="prompt sc-input-prompt">{{ prompt() }}</p>
        <div class="sc-input-row">
          <input
            #cmdInput
            class="sc-cmd-input"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            aria-label="Terminal command"
            placeholder="Type a command, then press Enter"
            [attr.aria-busy]="busy()"
            (input)="setCommand(cmdInput.value)"
            (keydown.enter)="$event.preventDefault(); runCommand()"
            (keydown.arrowUp)="$event.preventDefault(); recall(-1)"
            (keydown.arrowDown)="$event.preventDefault(); recall(1)"
            (keydown.tab)="$event.preventDefault(); autocomplete()"
          />
        </div>
      </div>
    }
  </div>
</div>
