@if (entry(); as guide) {
  <div class="sc-dialog-backdrop" (click)="close.emit()" role="presentation">
    <div
      class="sc-dialog sc-command-guide-dialog"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="dialogTitleId"
      (click)="$event.stopPropagation()"
      (keydown.escape)="close.emit()"
    >
      <header class="sc-dialog-head">
        <div>
          <span class="sc-chip sc-chip-green">Command reference</span>
          <h2 [id]="dialogTitleId">
            <code>{{ guide.pattern }}</code>
          </h2>
          <p class="sc-dialog-lead">{{ guide.summary }}</p>
        </div>
        <button class="sc-dialog-close" type="button" aria-label="Close" (click)="close.emit()">
          ×
        </button>
      </header>

      <div class="sc-dialog-body">
        @for (paragraph of guide.detail; track paragraph) {
          <p [class.is-bullet]="paragraph.startsWith('•')">{{ paragraph }}</p>
        }
      </div>
    </div>
  </div>
}
